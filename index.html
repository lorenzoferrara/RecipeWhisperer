<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">La Cucina</span>
      </div>
      <p class="header-sub">A personal collection of recipes</p>
    </div>
  </header>

  <!-- BODY LAYOUT -->
  <div class="page-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <p class="sidebar-heading">Filters</p>

      <div class="filter-group">
        <label for="search-input">Search</label>
        <input
          type="text"
          id="search-input"
          placeholder="ingredient or name…"
          autocomplete="off"
        />
      </div>

      <div class="filter-group">
        <label for="type-select">Type of dish</label>
        <select id="type-select">
          <option value="all">All types</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="cuisine-select">Cuisine</label>
        <select id="cuisine-select">
          <option value="all">All cuisines</option>
        </select>
      </div>

      <button id="clear-btn" class="clear-btn" aria-label="Clear filters">Clear filters</button>

      <p class="results-count" id="results-count"></p>
    </aside>

    <!-- RECIPE GRID -->
    <main>
      <div class="recipe-grid" id="recipe-grid">
        <!-- Cards injected by JS -->
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <span class="empty-icon">🍽</span>
        <p>No recipes match your filters.</p>
        <button onclick="clearFilters()">Clear filters</button>
      </div>
    </main>

  </div>

  <!-- MODAL -->
  <div class="modal-backdrop" id="modal-backdrop" hidden aria-modal="true" role="dialog">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close recipe">✕</button>
      <div class="modal-image-wrap">
        <img id="modal-img" src="" alt="" />
        <div class="modal-badges" id="modal-badges"></div>
      </div>
      <div class="modal-body">
        <div class="modal-meta" id="modal-meta"></div>
        <h2 id="modal-title"></h2>
        <div class="modal-section">
          <h3>Ingredients</h3>
          <ul id="modal-ingredients"></ul>
        </div>
        <div class="modal-section">
          <h3>Instructions</h3>
          <ol id="modal-instructions"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
