<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Cucina</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png" />
  <link rel="icon" href="/icons/favicon.ico" sizes="any" />
  <meta name="theme-color" content="#5c3d2e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">La Cucina</span>
      </div>
      <p class="header-sub">La mia collezione personale di ricette</p>
    </div>
  </header>

  <!-- BODY LAYOUT -->
  <div class="page-layout">

    <!-- SIDEBAR FILTERS -->
    <aside class="sidebar">
      <p class="sidebar-heading">Filtri</p>

      <div class="filter-group">
        <label for="search-input">Cerca</label>
        <input
          type="text"
          id="search-input"
          placeholder="ingrediente o nome…"
          autocomplete="off"
        />
      </div>

      <div class="filter-group">
        <label for="type-select">Tipo di piatto</label>
        <select id="type-select">
          <option value="all">Tutti i tipi</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="cuisine-select">Cucina</label>
        <select id="cuisine-select">
          <option value="all">Tutte le cucine</option>
        </select>
      </div>

      <button id="clear-btn" class="clear-btn" aria-label="Azzera filtri">Azzera filtri</button>

      <p class="results-count" id="results-count"></p>
    </aside>

    <!-- RECIPE GRID -->
    <main>
      <div class="recipe-grid" id="recipe-grid">
        <!-- Cards injected by JS -->
      </div>
      <div class="empty-state" id="empty-state" hidden>
        <span class="empty-icon">🍽</span>
        <p>Nessuna ricetta corrisponde ai filtri selezionati.</p>
        <button onclick="clearFilters()">Azzera filtri</button>
      </div>
    </main>

  </div>

  <!-- MODAL -->
  <div class="modal-backdrop" id="modal-backdrop" hidden aria-modal="true" role="dialog">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Chiudi ricetta">✕</button>
      <div class="modal-image-wrap">
        <img id="modal-img" src="" alt="" />
        <div class="modal-badges" id="modal-badges"></div>
      </div>
      <div class="modal-body">
        <div class="modal-meta" id="modal-meta"></div>
        <h2 id="modal-title"></h2>
        <div class="modal-section">
          <h3>Ingredienti</h3>
          <ul id="modal-ingredients"></ul>
        </div>
        <div class="modal-section">
          <h3>Preparazione</h3>
          <ol id="modal-instructions"></ol>
        </div>
        <div class="modal-section" id="modal-notes-section" hidden>
          <h3>Note</h3>
          <p id="modal-notes"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
